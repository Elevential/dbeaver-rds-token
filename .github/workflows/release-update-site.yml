name: Publish update site

# Builds the plugin + p2 update site and publishes it to GitHub Pages.
# Triggers on version tags like v1.2.3 (and can be run manually).
#
# One-time repo setup:
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# After the first run, your update site URL is:
#   https://<owner>.github.io/<repo>/
# which users paste into DBeaver: Help -> Install New Software -> Add.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # DBeaver CE Linux build to compile the plugin against and to borrow the p2
  # publisher from. Pin to a specific version for reproducibility if desired.
  DBEAVER_URL: https://dbeaver.io/files/dbeaver-ce-latest-linux.gtk.x86_64-nojdk.tar.gz

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Derive version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"                 # v1.2.3 -> 1.2.3
          else
            VER="0.0.0.dev$(date +%Y%m%d%H%M%S)"       # manual runs
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building version $VER"

      - name: Stamp version into manifest & feature
        run: |
          VER="${{ steps.ver.outputs.version }}"
          sed -i "s/^Bundle-Version: .*/Bundle-Version: ${VER}/" META-INF/MANIFEST.MF
          # Feature element version is the committed placeholder 1.0.0; the plugin
          # reference stays 0.0.0 (= any) so it is left untouched.
          sed -i "s/version=\"1.0.0\"/version=\"${VER}\"/" feature/feature.xml feature/category.xml

      - name: Download DBeaver CE (build/publish toolchain)
        run: |
          curl -fsSL "$DBEAVER_URL" -o dbeaver.tar.gz
          tar xzf dbeaver.tar.gz          # extracts ./dbeaver
          test -d dbeaver/plugins

      - name: Build plugin + generate update site
        env:
          ECLIPSE_HOME: ${{ github.workspace }}/dbeaver
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x build.sh make-update-site.sh
          ./make-update-site.sh
          echo "--- update-site contents ---"
          ls -R update-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: update-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
