name: Publish update site

# Builds the plugin + p2 update site and publishes it to GitHub Pages.
#
# Version scheme:
#   - push to main/master -> <base>.<UTC-timestamp>  (e.g. 0.0.2.20260703T2015)
#     so every push publishes a strictly-newer build that DBeaver's
#     "Check for Updates" will pick up.
#   - tag vX.Y.Z          -> exactly X.Y.Z            (clean, pinned release)
#   <base> is the major.minor.micro from META-INF/MANIFEST.MF (Bundle-Version).
#
# One-time repo setup:
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# After the first run, your update site URL is:
#   https://<owner>.github.io/<repo>/
# which users paste into DBeaver: Help -> Install New Software -> Add.

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # DBeaver CE Linux build to compile the plugin against and to borrow the p2
  # publisher from. Pin to a specific version for reproducibility if desired.
  DBEAVER_URL: https://dbeaver.io/files/dbeaver-ce-latest-linux.gtk.x86_64.tar.gz

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Derive version
        id: ver
        run: |
          # Base = major.minor.micro from the committed Bundle-Version.
          BASE=$(sed -n 's/^Bundle-Version: *//p' META-INF/MANIFEST.MF | cut -d. -f1-3)
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"                       # v0.0.3 -> 0.0.3
          else
            VER="${BASE}.$(date -u +%Y%m%dT%H%M%S)"          # 0.0.2.20260703T201500
          fi
          echo "base=$BASE"       >> "$GITHUB_OUTPUT"
          echo "version=$VER"     >> "$GITHUB_OUTPUT"
          echo "Building version $VER (base $BASE)"

      - name: Stamp version into manifest & feature
        run: |
          VER="${{ steps.ver.outputs.version }}"
          BASE="${{ steps.ver.outputs.base }}"
          sed -i "s/^Bundle-Version: .*/Bundle-Version: ${VER}/" META-INF/MANIFEST.MF
          # Replace the committed base feature version; the plugin reference stays
          # 0.0.0 (= any), and the XML declaration (version="1.0") is untouched.
          sed -i "s/version=\"${BASE}\"/version=\"${VER}\"/" feature/feature.xml feature/category.xml

      - name: Download DBeaver CE (build/publish toolchain)
        run: |
          curl -fsSL "$DBEAVER_URL" -o dbeaver.tar.gz
          tar xzf dbeaver.tar.gz          # extracts ./dbeaver
          test -d dbeaver/plugins

      - name: Build plugin + generate update site
        env:
          ECLIPSE_HOME: ${{ github.workspace }}/dbeaver
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x build.sh make-update-site.sh
          ./make-update-site.sh
          echo "--- update-site contents ---"
          ls -R update-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: update-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
